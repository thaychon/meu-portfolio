<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N4VEGA_DEV_PORTFOLIO | System</title>
    <style>
        /* Reset */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #153c32; /* cor de fundo */
        }

        #vanta-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .overlay-content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #3fffa4;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px rgba(63, 255, 164, 0.5);
            text-align: center;
            pointer-events: none; /* mouse interage com vanta por trás do texto */
        }

        .glitch-text {
            font-size: 3rem;
            letter-spacing: 5px;
            border-right: 3px solid #3fffa4;
            white-space: nowrap;
            overflow: hidden;
            /* animação digitação leva exatos 3.5s */
            animation: typing 3.5s steps(30, end), blink .75s step-end infinite;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink {
            from, to { border-color: transparent }
            50% { border-color: #3fffa4 }
        }

        /* --- style buttons and slowless --- */
        .button-container {
            margin-top: 40px;
            display: flex;
            gap: 20px;
            pointer-events: auto; 
            
            /*  começa invisível e espera 3.5s para rodar a animação */
            opacity: 0; 
            animation: terminalBoot 0.4s ease forwards;
            animation-delay: 3.5s; /* sincorniza com o fim do texto */
        }

        /* animação de boot (piscada de tela CRT) */
        @keyframes terminalBoot {
            0%   { opacity: 0; transform: scale(0.95); }
            20%  { opacity: 1; }
            40%  { opacity: 0; }
            60%  { opacity: 1; }
            80%  { opacity: 0.5; }
            100% { opacity: 1; transform: scale(1); }
        }

        .hacker-btn {
            background: rgba(63, 255, 164, 0.1);
            border: 1px solid #3fffa4;
            color: #3fffa4;
            padding: 12px 24px;
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            outline: none;
            overflow: hidden;
            text-decoration: none;
        }

        /* efeito ao passar o mouse */
        .hacker-btn:hover {
            background: rgba(63, 255, 164, 0.3);
            box-shadow: 0 0 15px #3fffa4, inset 0 0 10px #3fffa4;
            text-shadow: 0 0 5px #fff;
            transform: translateY(-2px);
        }

        /* colchetes que aparecem no hover */
        .hacker-btn::before {
            content: '[';
            position: absolute;
            left: 5px;
            transition: 0.3s;
            opacity: 0;
        }

        .hacker-btn::after {
            content: ']';
            position: absolute;
            right: 5px;
            transition: 0.3s;
            opacity: 0;
        }

        .hacker-btn:hover::before { opacity: 1; left: 2px; }
        .hacker-btn:hover::after { opacity: 1; right: 2px; }

    </style>
</head>
<body>

    <div id="vanta-bg"></div>

    <div class="overlay-content">
        <h1 class="glitch-text">INITIALIZING BYPASS...</h1>
        <p>[ LOGIN: N4VEGA_DEV ]</p>
        
        <div class="button-container">
            <button class="hacker-btn" onclick="window.location.href='https://github.com/N4VEGADEV'">GitHub</button>
            <button class="hacker-btn" onclick="window.location.href='https://github.com/N4VEGADEV?tab=projects'">Projetos</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>

    <script>
        VANTA.NET({
          el: "#vanta-bg", 
          mouseControls: true,
          touchControls: true,
          gyroControls: false,
          minHeight: 200.00,
          minWidth: 200.00,
          scale: 1.00,
          scaleMobile: 1.00,
          color: 0x3fffa4,       
          backgroundColor: 0x153c32, 
          points: 15.00,         
          maxDistance: 22.00,
          spacing: 15.00
        })
    </script>
</body>
</html>
